<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0816 - Snapchat Companion</title>
  <link rel="stylesheet" href="style.css?v=2.1">
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="status">
      <div class="avatar">👻</div>
      <div>
        <div class="name">0816</div>
        <div class="online">● Active</div>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" onclick="alert('Coming soon')" title="Camera">📷</button>
      <button class="icon-btn" onclick="alert('Coming soon')" title="Settings">⚙️</button>
    </div>
  </div>

  <div id="chat" class="chat"></div>

  <div class="inputbar">
    <input type="file" id="fileInput" accept="image/*" hidden>
    <button class="icon-btn" onclick="fileInput.click()" title="Photo">📸</button>
    <button class="icon-btn" id="recordBtn" title="Voice">🎤</button>
    <input id="input" type="text" placeholder="Say something..." />
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script src="app.js?v=2.1"></script>
</body>
</html>
